name: autoblog audit (reusable)

on:
  workflow_call:
    inputs:
      config_path:
        type: string
        default: "autoblog.config.json"
      model:
        description: "CLI alias (opus|sonnet|haiku) or full model id"
        type: string
        default: "opus"
      engine_ref:
        type: string
        default: "v1"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude subscription token. One of this or ANTHROPIC_API_KEY is required."
        required: false
      ANTHROPIC_API_KEY:
        description: "Anthropic API key — used in preference to the OAuth token when set."
        required: false
      GSC_CREDENTIALS:
        description: "Search Console service-account JSON; audit skips without it"
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_gsc: ${{ steps.probe.outputs.has_gsc }}
    steps:
      - id: probe
        env:
          GSC: ${{ secrets.GSC_CREDENTIALS }}
        run: |
          if [ -n "$GSC" ]; then
            echo "has_gsc=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gsc=false" >> "$GITHUB_OUTPUT"
            echo "No GSC_CREDENTIALS secret — audit skipped (this is fine; add the secret to enable it)."
          fi

  audit:
    needs: check
    if: needs.check.outputs.has_gsc == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: Amian/autoblog-engine
          ref: ${{ inputs.engine_ref }}
          path: .autoblog-engine
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run the audit
        uses: anthropics/claude-code-action@v1
        env:
          AUTOBLOG_ENGINE_DIR: .autoblog-engine
          AUTOBLOG_CONFIG: ${{ inputs.config_path }}
          GSC_CREDENTIALS: ${{ secrets.GSC_CREDENTIALS }}
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_API_KEY == '' && secrets.CLAUDE_CODE_OAUTH_TOKEN || '' }}
          claude_args: >-
            --model ${{ inputs.model }}
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Task,TodoWrite"
          prompt: |
            Read .autoblog-engine/prompts/audit.md and execute it exactly.
            Config: ${{ inputs.config_path }}. GSC service-account JSON is in the
            GSC_CREDENTIALS env var. Use `gh` (GH_TOKEN is set) for PRs and issues.
