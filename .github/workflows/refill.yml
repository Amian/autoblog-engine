name: autoblog refill (reusable)

on:
  workflow_call:
    inputs:
      config_path:
        type: string
        default: "autoblog.config.json"
      force:
        description: "refill even when the queue is healthy"
        type: boolean
        default: false
      dry_run:
        description: "calendar + 2 posts on a branch, no PR"
        type: boolean
        default: false
      days:
        description: "override cadence.batchTargetDays"
        type: string
        default: ""
      model:
        description: "CLI alias (opus|sonnet|haiku) or full model id"
        type: string
        default: "opus"
      engine_ref:
        type: string
        default: "v1"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      AUTOBLOG_PAT:
        description: "optional PAT so the refill PR triggers the gates workflow"
        required: false

concurrency:
  group: autoblog-refill-${{ github.repository }}
  cancel-in-progress: false

jobs:
  runway:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      needs_refill: ${{ steps.runway.outputs.needs_refill }}
      dry_date: ${{ steps.runway.outputs.dry_date }}
      days: ${{ steps.runway.outputs.days }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: Amian/autoblog-engine
          ref: ${{ inputs.engine_ref }}
          path: .autoblog-engine
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: runway
        run: python3 .autoblog-engine/scripts/runway.py --config "${{ inputs.config_path }}"

  generate:
    needs: runway
    if: ${{ inputs.force || inputs.dry_run || needs.runway.outputs.needs_refill == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: Amian/autoblog-engine
          ref: ${{ inputs.engine_ref }}
          path: .autoblog-engine
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet Pillow
      - id: cfg
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import sys
          sys.path.insert(0, ".autoblog-engine/scripts")
          from _common import load_config
          cfg = load_config("${{ inputs.config_path }}")
          print(f"setup={cfg['build']['setup']}")
          print(f"ruby={cfg['build']['rubyVersion']}")
          print(f"node={cfg['build']['nodeVersion']}")
          PY
      - if: steps.cfg.outputs.setup == 'ruby-bundler'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.cfg.outputs.ruby }}
          bundler-cache: true
      - if: steps.cfg.outputs.setup == 'node-pnpm'
        uses: pnpm/action-setup@v4
      - if: steps.cfg.outputs.setup == 'node-pnpm'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.cfg.outputs.node }}
          cache: pnpm
      - if: steps.cfg.outputs.setup == 'node-pnpm'
        run: pnpm install --frozen-lockfile
      - name: Refill the queue
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          AUTOBLOG_CONFIG: ${{ inputs.config_path }}
          AUTOBLOG_DRY_RUN: ${{ inputs.dry_run }}
          AUTOBLOG_DAYS: ${{ inputs.days }}
          AUTOBLOG_DRY_DATE: ${{ needs.runway.outputs.dry_date }}
          AUTOBLOG_BRANCH: autoblog/refill-${{ needs.runway.outputs.dry_date }}
          GH_TOKEN: ${{ secrets.AUTOBLOG_PAT || github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --model ${{ inputs.model }}
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Task,TodoWrite"
          prompt: |
            Read .autoblog-engine/prompts/refill.md and execute it exactly.
            Environment (also exported as env vars): config=${{ inputs.config_path }},
            dry_run=${{ inputs.dry_run }}, days_override=${{ inputs.days || 'none' }},
            queue dry date=${{ needs.runway.outputs.dry_date }},
            branch=autoblog/refill-${{ needs.runway.outputs.dry_date }}.
            Use `gh` (GH_TOKEN is set) for the pull request.
      - name: Fail if Claude errored
        if: always()
        env:
          EXEC_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "No execution file from the Claude step — treating as failure."
            exit 1
          fi
          python3 - <<'PY'
          import json, os, sys
          data = json.load(open(os.environ["EXEC_FILE"]))
          msgs = data if isinstance(data, list) else [data]
          result = next((m for m in reversed(msgs) if m.get("type") == "result"), None)
          if result is None:
              sys.exit("No result message in execution output — failing.")
          if result.get("is_error"):
              print(json.dumps(result, indent=2)[:2000])
              sys.exit("Claude reported is_error=true (see result above) — failing the job.")
          print(f"Claude OK: {result.get('num_turns')} turns, "
                f"${result.get('total_cost_usd')}, {result.get('duration_ms')}ms")
          PY
